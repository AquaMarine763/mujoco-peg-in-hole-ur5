# Real UR5 dry-run defaults. These are conservative placeholders and must be
# replaced with measured values before any hardware motion.

control_frequency_hz: 20
image_width: 100
image_height: 100
crop_xywh: none
rotate_k: 0
flip_horizontal: false
flip_vertical: false
max_steps: 50

safety_max_action: 0.002
safety_action_filter_alpha: 0.6
safety_workspace_low: [0.45, -0.10, 0.60]
safety_workspace_high: [0.65, 0.15, 0.82]

peg_tip_pos: [0.55, 0.05, 0.78]
target_pos: [0.55, 0.05, 0.65]
pose_trace: none
tcp_pose_trace: none
pose_frame: robot_base
tcp_to_peg_tip_xyz: [0, 0, -0.11]
guard_approach_height: 0.08
guard_action_limit: 0.002

# Calibration placeholders for the next implementation stage.
camera_fx: 0
camera_fy: 0
camera_cx: 0
camera_cy: 0
tool0_to_camera_xyz: [0, 0, 0]
tool0_to_camera_rpy: [0, 0, 0]
tool0_to_peg_tip_xyz: [0, 0, -0.11]
