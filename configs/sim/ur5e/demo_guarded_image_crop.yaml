# High-resolution UR5e guarded rollout demo.
agent: sac
model: checkpoints_image_bc_ur5e_adapter_fixedcam_full_light_geometry_staged_crop_full_light_replay_750k_oracle_e4/sac_image_bc.zip
output: demos/ur5e/mainline/demo_guarded_full_light_geometry.mp4
observation_mode: image
episodes: 1
fps: 20
width: 100
height: 100
include_near_hole_crop: true
near_hole_crop_size: 64
render_width: 1280
render_height: 720
render_cameras: [overview, wrist_cam]
trajectory_output: results/ur5e/mainline/demo_guarded_full_light_geometry_trace.csv
device: cpu
seed: 1000
domain_randomization: true
domain_randomization_level: full_light_geometry
max_steps: 200
action_scale: 0.005
success_xy_tolerance: 0.005
success_z_tolerance: 0.01
approach_xy_tolerance: 0.06
approach_height: 0.08
guarded_policy: true
guard_scenario_filter: geometry
guard_scenario_name: full_light_geometry
guard_start_xy: 0.06
guard_start_z: 0.08
guard_risk_xy: 0.0
guard_blend: 0.75
guard_min_policy_steps: 0
guard_action_gain: 1.0
guarded_align_xy_tolerance: 0.025
guarded_insert_xy_tolerance: 0.005
guarded_retract_xy_tolerance: 0.012
guarded_preinsert_height: 0.0
guarded_max_xy_action: 0.005
guarded_max_down_action: 0.0035
guarded_max_up_action: 0.005
guarded_prediction_steps: 1.0
