# Medium full UR5e high-start visual-search oracle dataset smoke.
model_path: assets/ur5e_full/ur5e_peg_in_hole_full.xml
output: datasets/ur5e_full/high_start/medium/image_expert_high_start_medium_smoke.npz
samples: 512
oracle_mode: guarded_two_stage
rollout_noise_std: 0.0002
seed: 550000
success_only: true
compressed: true
domain_randomization: true
domain_randomization_level: visual_camera
image_width: 100
image_height: 100
include_near_hole_crop: true
near_hole_crop_size: 64
max_steps: 900
action_scale: 0.005
initialization_mode: target_relative_high_start
initial_tip_z_above_range: [0.10, 0.18]
initial_tip_xy_offset_range: [0.06, 0.12]
initial_tip_xy_angle_range_deg: [0.0, 360.0]
initial_ik_max_attempts: 30
target_low: [0.50, 0.00, 0.65]
target_high: [0.60, 0.10, 0.65]
success_xy_tolerance: 0.005
success_z_tolerance: 0.01
approach_xy_tolerance: 0.06
approach_height: 0.12
guarded_align_xy_tolerance: 0.020
guarded_insert_xy_tolerance: 0.005
guarded_retract_xy_tolerance: 0.012
guarded_preinsert_height: 0.0
guarded_max_xy_action: 0.005
guarded_max_down_action: 0.0035
guarded_max_up_action: 0.005
guarded_prediction_steps: 1.0
