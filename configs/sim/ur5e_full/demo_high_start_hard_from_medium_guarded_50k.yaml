# Demo the original hard high-start range using the medium 50k checkpoint.
model_path: assets/ur5e_full/ur5e_peg_in_hole_full.xml
agent: sac
model: checkpoints/ur5e_full/high_start/medium/sac_image_bc_50k_high_start_medium_visual_camera.zip
output: demos/ur5e_full/high_start/hard/demo_high_start_hard_from_medium_50k_standard_guard.mp4
observation_mode: image
episodes: 1
fps: 20
width: 100
height: 100
include_near_hole_crop: true
near_hole_crop_size: 64
render_width: 1280
render_height: 720
render_cameras: [overview, wrist_cam]
trajectory_output: results/ur5e_full/high_start/hard/demo_high_start_hard_from_medium_50k_standard_guard_trace.csv
device: cpu
seed: 557000
domain_randomization: true
domain_randomization_level: visual_camera
max_steps: 1000
action_scale: 0.005
target_low: [0.50, 0.00, 0.65]
target_high: [0.60, 0.10, 0.65]
initialization_mode: target_relative_high_start
initial_tip_z_above_range: [0.15, 0.25]
initial_tip_xy_offset_range: [0.08, 0.16]
initial_tip_xy_angle_range_deg: [0.0, 360.0]
initial_ik_max_attempts: 30
success_xy_tolerance: 0.005
success_z_tolerance: 0.01
geometry_hole_half_size_range: [0.017, 0.021]
approach_xy_tolerance: 0.02
approach_height: 0.12
staged_xy_weight: 2.0
staged_z_weight: 1.0
success_bonus: 120.0
collision_penalty: 300.0
timeout_penalty: 10.0
progress_reward_scale: 20.0
distance_reward_scale: 2.0
action_penalty_scale: 0.002
action_alignment_scale: 2.0
guarded_policy: true
guard_scenario_filter: all
guard_scenario_name: visual_camera
guard_start_xy: 0.06
guard_start_z: 0.12
guard_risk_xy: 0.0
guard_blend: 1.0
guard_min_policy_steps: 0
guard_action_gain: 1.0
guarded_align_xy_tolerance: 0.020
guarded_insert_xy_tolerance: 0.005
guarded_retract_xy_tolerance: 0.012
guarded_preinsert_height: 0.0
guarded_max_xy_action: 0.005
guarded_max_down_action: 0.0035
guarded_max_up_action: 0.005
guarded_prediction_steps: 1.0
