# Full UR5e image-policy evaluation with deployment-time guarded insertion.
model_path: assets/ur5e_full/ur5e_peg_in_hole_full.xml
agent: sac
model: checkpoints_image_bc_ur5e_adapter_fixedcam_full_light_geometry_staged_crop_full_light_replay_750k_oracle_e4/sac_image_bc.zip
observation_mode: image
episodes: 100
device: cpu
seed: 90000
output_csv: results/ur5e_full/mainline/eval_guarded_image_crop.csv
output_md: results/ur5e_full/mainline/eval_guarded_image_crop.md
include_hard_bucket: true
guard_scenario_filter: geometry
width: 100
height: 100
include_near_hole_crop: true
near_hole_crop_size: 64
max_steps: 200
action_scale: 0.005
success_xy_tolerance: 0.005
success_z_tolerance: 0.01
geometry_hole_half_size_range: [0.017, 0.021]
approach_xy_tolerance: 0.02
approach_height: 0.08
staged_xy_weight: 2.0
staged_z_weight: 1.0
success_bonus: 120.0
collision_penalty: 300.0
timeout_penalty: 10.0
progress_reward_scale: 20.0
distance_reward_scale: 2.0
action_penalty_scale: 0.002
action_alignment_scale: 2.0
guard_start_xy: 0.06
guard_start_z: 0.08
guard_risk_xy: 0.0
guard_blend: 1.0
guard_min_policy_steps: 0
guard_action_gain: 1.0
guarded_align_xy_tolerance: 0.020
guarded_insert_xy_tolerance: 0.005
guarded_retract_xy_tolerance: 0.012
guarded_preinsert_height: 0.0
guarded_max_xy_action: 0.005
guarded_max_down_action: 0.0035
guarded_max_up_action: 0.005
guarded_prediction_steps: 1.0
