# Experimental multi-geometry smoke for feature/multi-geometry.
# This is a runnable path check, not a promoted performance gate.

model_path: assets/ur5e_full/ur5e_peg_in_hole_full.xml
agent: sac
model: checkpoints/ur5e_full/high_start/hard/correction/sac_image_bc_wrist_pose_control_state_insert_drift_2k_w10_e1.zip
observation_mode: image
episodes: 5
device: cpu
seed: 612000
output_csv: results/ur5e_full/multi_geometry/eval_multi_geometry_smoke.csv
output_md: results/ur5e_full/multi_geometry/eval_multi_geometry_smoke.md
episode_output_csv: results/ur5e_full/multi_geometry/eval_multi_geometry_smoke_episodes.csv
step_trace_outcome_filter: failure
hard_bucket_only: true

geometry_profile: mixed_basic
geometry_square_peg_half_size_range: [0.0105, 0.0125]
geometry_mixed_square_probability: 0.5
geometry_hole_half_size_range: [0.017, 0.021]

width: 100
height: 100
include_near_hole_crop: true
near_hole_crop_size: 64
near_hole_crop_offset: [-18, 0]
include_control_state: true
image_frame_stack: 1
wrist_camera_pos_offset: [-0.04, -0.04, 0.0]
wrist_camera_rot_offset_deg: [0.0, 0.0, 0.0]
wrist_camera_fovy: 100.0

max_steps: 1000
action_scale: 0.005
initialization_mode: target_relative_high_start
initial_tip_z_above_range: [0.15, 0.25]
initial_tip_xy_offset_range: [0.08, 0.16]
initial_tip_xy_angle_range_deg: [0.0, 360.0]
initial_ik_max_attempts: 30
success_xy_tolerance: 0.005
success_z_tolerance: 0.01

ik_control_mode: pose
ik_orientation_weight: 0.03
ik_posture_weight: 0.01
ik_step_limit: 0.06
ik_max_iterations: 64
nominal_actuator_kp_multiplier: 2.0
guard_near_actuator_kp_enabled: true
guard_near_actuator_kp_multiplier: 3.0
guard_near_ik_orientation_weight: 0.0

guard_scenario_filter: all
guard_start_xy: 0.06
guard_start_z: 0.12
guard_blend: 1.0
guard_stateful_recovery_enabled: true
guard_final_servo_enabled: true
guard_final_servo_stable_xy: 0.0049
guarded_oracle_mode: guarded_two_stage
guarded_prediction_steps: 0.0
