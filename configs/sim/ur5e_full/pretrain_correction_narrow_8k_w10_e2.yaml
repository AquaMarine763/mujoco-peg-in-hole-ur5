# Weighted narrowed-hole correction fine-tune from the current narrowed-hole checkpoint.
model_path: assets/ur5e_full/ur5e_peg_in_hole_full.xml
datasets: [datasets/ur5e_full/adapt/image_expert_50k_narrow_hole_full_light_geometry.npz, datasets/ur5e_full/correction/image_correction_narrow_near_hole_failure_window_8k_min006.npz]
dataset_weights: [0.90, 0.10]
output: checkpoints/ur5e_full/correction/sac_image_bc_50k_narrow_correction_8k_w10_e2.zip
metadata_output: results/ur5e_full/correction/training_metadata_narrow_correction_8k_w10_e2.json
model: checkpoints/ur5e_full/adapt/sac_image_bc_50k_narrow_hole_full_light_geometry.zip
epochs: 2
samples_per_epoch: 120000
batch_size: 512
learning_rate: 0.000005
validation_split: 0.05
validation_batches: 20
device: cpu
seed: 640000
image_width: 100
image_height: 100
include_near_hole_crop: true
near_hole_crop_size: 64
max_steps: 200
action_scale: 0.005
target_low: [0.50, 0.00, 0.65]
target_high: [0.60, 0.10, 0.65]
