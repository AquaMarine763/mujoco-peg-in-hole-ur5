# Easy high-start BC fine-tune from the current narrowed-hole checkpoint.
model_path: assets/ur5e_full/ur5e_peg_in_hole_full.xml
dataset: datasets/ur5e_full/high_start/easy/image_expert_20k_high_start_easy_visual_camera.npz
output: checkpoints/ur5e_full/high_start/easy/sac_image_bc_20k_high_start_easy_visual_camera.zip
model: checkpoints/ur5e_full/adapt/sac_image_bc_50k_narrow_hole_full_light_geometry.zip
epochs: 10
batch_size: 256
learning_rate: 0.000015
validation_split: 0.1
device: cpu
seed: 533000
image_width: 100
image_height: 100
include_near_hole_crop: true
near_hole_crop_size: 64
max_steps: 800
action_scale: 0.005
target_low: [0.50, 0.00, 0.65]
target_high: [0.60, 0.10, 0.65]
initialization_mode: target_relative_high_start
initial_tip_z_above_range: [0.08, 0.15]
initial_tip_xy_offset_range: [0.04, 0.10]
initial_tip_xy_angle_range_deg: [0.0, 360.0]
initial_ik_max_attempts: 30
success_xy_tolerance: 0.005
success_z_tolerance: 0.01
geometry_hole_half_size_range: [0.017, 0.021]
approach_xy_tolerance: 0.06
approach_height: 0.10
staged_xy_weight: 2.0
staged_z_weight: 1.0
success_bonus: 120.0
collision_penalty: 300.0
timeout_penalty: 10.0
progress_reward_scale: 20.0
distance_reward_scale: 2.0
action_penalty_scale: 0.002
action_alignment_scale: 2.0
