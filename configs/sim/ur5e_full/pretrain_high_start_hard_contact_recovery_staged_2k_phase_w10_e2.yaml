# Phase-balanced Track B staged correction fine-tune.
#
# Dataset replay remains conservative at 10%, but correction batches are
# rebalanced so realign and slow_insert are not drowned by unjam_lift labels.
model_path: assets/ur5e_full/ur5e_peg_in_hole_full.xml
datasets: [datasets/ur5e_full/high_start/hard/image_expert_50k_high_start_hard_safe_visual_camera.npz, datasets/ur5e_full/high_start/hard/correction/image_correction_high_start_hard_contact_recovery_staged_2k.npz]
dataset_weights: [0.90, 0.10]
phase_balanced_recovery: true
recovery_phase_names: [unjam_lift, realign, slow_insert]
recovery_phase_weights: [0.30, 0.35, 0.35]
model: checkpoints/ur5e_full/high_start/hard/sac_image_bc_50k_high_start_hard_safe_visual_camera.zip
output: checkpoints/ur5e_full/high_start/hard/correction/sac_image_bc_50k_contact_recovery_staged_2k_phase_w10_e2.zip
metadata_output: results/ur5e_full/high_start/hard/correction/training_metadata_contact_recovery_staged_2k_phase_w10_e2.json
epochs: 2
samples_per_epoch: 8192
batch_size: 256
learning_rate: 0.000005
validation_split: 0.05
validation_batches: 4
device: cpu
seed: 581000
image_width: 100
image_height: 100
include_near_hole_crop: true
near_hole_crop_size: 64
max_steps: 1000
action_scale: 0.005
success_xy_tolerance: 0.005
success_z_tolerance: 0.01
geometry_hole_half_size_range: [0.017, 0.021]
approach_xy_tolerance: 0.02
approach_height: 0.12
staged_xy_weight: 2.0
staged_z_weight: 1.0
success_bonus: 120.0
collision_penalty: 300.0
timeout_penalty: 10.0
progress_reward_scale: 20.0
distance_reward_scale: 2.0
action_penalty_scale: 0.002
action_alignment_scale: 2.0
