# Medium-low-weight correction fine-tune for hard high-start near-hole plateaus.
model_path: assets/ur5e_full/ur5e_peg_in_hole_full.xml
datasets: [datasets/ur5e_full/high_start/hard/image_expert_50k_high_start_hard_safe_visual_camera.npz, datasets/ur5e_full/high_start/hard/correction/image_correction_high_start_hard_near_hole_plateau_2k.npz]
dataset_weights: [0.90, 0.10]
output: checkpoints/ur5e_full/high_start/hard/correction/sac_image_bc_50k_high_start_hard_correction_2k_w10_e2.zip
