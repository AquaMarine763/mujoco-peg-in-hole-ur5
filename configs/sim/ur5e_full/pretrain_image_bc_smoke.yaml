# One-epoch full UR5e BC smoke.
model_path: assets/ur5e_full/ur5e_peg_in_hole_full.xml
dataset: datasets/ur5e_full/smoke/image_expert_narrow_hole_smoke.npz
output: checkpoints/ur5e_full/smoke/sac_image_bc_narrow_hole_smoke.zip
model: checkpoints/ur5e_full/adapt/sac_image_bc_50k_full_light_geometry.zip
epochs: 1
batch_size: 64
learning_rate: 0.000015
validation_split: 0.1
device: cpu
seed: 40000
image_width: 100
image_height: 100
include_near_hole_crop: true
near_hole_crop_size: 64
max_steps: 200
action_scale: 0.005
target_low: [0.50, 0.00, 0.65]
target_high: [0.60, 0.10, 0.65]
success_xy_tolerance: 0.005
success_z_tolerance: 0.01
geometry_hole_half_size_range: [0.017, 0.021]
approach_xy_tolerance: 0.06
approach_height: 0.08
staged_xy_weight: 2.0
staged_z_weight: 1.0
success_bonus: 120.0
collision_penalty: 300.0
timeout_penalty: 10.0
progress_reward_scale: 20.0
distance_reward_scale: 2.0
action_penalty_scale: 0.002
action_alignment_scale: 2.0
