# Fast guarded-parameter scan for the narrowed full UR5e hole.
model_path: assets/ur5e_full/ur5e_peg_in_hole_full.xml
agent: sac
model: checkpoints/ur5e_full/adapt/sac_image_bc_50k_narrow_hole_full_light_geometry.zip
observation_mode: image
episodes: 5
device: cpu
seed: 92000
output_csv: results/ur5e_full/adapt/scan_guarded_narrow_hole_smoke.csv
output_md: results/ur5e_full/adapt/scan_guarded_narrow_hole_smoke.md
preset: smoke
scenario_preset: targeted
guard_scenario_filter: all
width: 100
height: 100
include_near_hole_crop: true
near_hole_crop_size: 64
max_steps: 200
action_scale: 0.005
success_xy_tolerance: 0.005
success_z_tolerance: 0.01
approach_xy_tolerance: 0.02
approach_height: 0.08
staged_xy_weight: 2.0
staged_z_weight: 1.0
success_bonus: 120.0
collision_penalty: 300.0
timeout_penalty: 10.0
progress_reward_scale: 20.0
distance_reward_scale: 2.0
action_penalty_scale: 0.002
action_alignment_scale: 2.0
